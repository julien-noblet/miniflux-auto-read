version: "2"
run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gocyclo
    - misspell
    - bodyclose
    - noctx
    - funlen
    - gosec
    - lll
    - testifylint

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
    
